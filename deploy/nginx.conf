server {
    listen 80;
    server_name skiboerse-renningen localhost 192.168.178.65;

    # React frontend (static build files)
    location / {
        root /home/pi/skiboerse/frontend_skiboerse/build;
        try_files $uri $uri/ /index.html;
    }

    # Static files (Django collectstatic + React build assets)
    location /static/ {
        alias /home/pi/skiboerse/staticfiles/;
    }

    # Django API + Admin
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
