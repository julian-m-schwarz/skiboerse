# Nginx configuration for Skiboerse with HTTPS and connection limiting
# Copy to: /etc/nginx/sites-available/skiboerse
# Enable with: sudo ln -s /etc/nginx/sites-available/skiboerse /etc/nginx/sites-enabled/
#
# WICHTIG: Vor dem Aktivieren HTTPS-Zertifikat erstellen:
#   sudo openssl req -x509 -nodes -days 3650 -newkey rsa:2048 \
#     -keyout /etc/ssl/private/skiboerse.key \
#     -out /etc/ssl/certs/skiboerse.crt \
#     -subj "/CN=skiboerse.local"

# Connection limiting zones (place in http block or include file)
# Limits per IP address to prevent single device from hogging resources
limit_conn_zone $binary_remote_addr zone=per_ip:10m;

# Limit total connections to the app
limit_conn_zone $server_name zone=per_server:10m;

# Rate limiting for API requests (prevents spam)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name skiboerse.local 192.168.4.1 _;
    return 301 https://$host$request_uri;
}

# HTTPS server (Kamerazugriff auf Handys erfordert HTTPS)
server {
    listen 443 ssl;
    server_name skiboerse.local 192.168.4.1 _;

    ssl_certificate     /etc/ssl/certs/skiboerse.crt;
    ssl_certificate_key /etc/ssl/private/skiboerse.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Connection limits
    limit_conn per_ip 10;           # Max 10 connections per IP
    limit_conn per_server 50;       # Max 50 total connections
    limit_conn_status 503;          # Return 503 when limit exceeded
    limit_conn_log_level warn;

    # Custom error pages
    error_page 503 /503.html;
    location = /503.html {
        root /opt/skiboerse/nginx;
        internal;
    }

    # Timeouts for slow connections
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 10s;

    # Limit request body size
    client_max_body_size 5M;

    # Static files (React build)
    location /static/ {
        alias /opt/skiboerse/frontend_skiboerse/build/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";

        # No connection limit for static files
        limit_conn off;
    }

    # API endpoints with rate limiting
    location /api/ {
        # Rate limit: 10 requests/second with burst of 20
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 503;

        proxy_pass http://unix:/run/gunicorn.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # Proxy timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Django admin
    location /admin/ {
        proxy_pass http://unix:/run/gunicorn.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # React app (catch-all)
    location / {
        root /opt/skiboerse/frontend_skiboerse/build;
        try_files $uri $uri/ /index.html;

        # Cache HTML for short time only
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Health check endpoint (no limits)
    location /health {
        limit_conn off;
        limit_req off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}
