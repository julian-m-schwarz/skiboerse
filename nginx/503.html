<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server ausgelastet - Skibörse Renningen</title>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #F0F9FA 0%, #D4EEF0 100%);
            padding: 2rem;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 3rem;
            text-align: center;
            max-width: 500px;
            box-shadow: 0 8px 32px rgba(78, 189, 196, 0.2);
        }

        .logo {
            font-family: 'Permanent Marker', cursive;
            font-size: 1.8rem;
            color: #4EBDC4;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .logo-icon {
            font-size: 2rem;
        }

        .error-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        h1 {
            font-family: 'Permanent Marker', cursive;
            color: #2D3436;
            font-size: 1.8rem;
            margin-bottom: 1rem;
            letter-spacing: 1px;
        }

        p {
            color: #2D3436;
            line-height: 1.6;
            margin-bottom: 1rem;
        }

        .hint {
            background: linear-gradient(135deg, #F0F9FA 0%, #D4EEF0 100%);
            padding: 1rem;
            border-radius: 12px;
            margin: 1.5rem 0;
            font-size: 0.9rem;
        }

        .btn {
            display: inline-block;
            background: #4EBDC4;
            color: white;
            padding: 1rem 2rem;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
            margin-top: 1rem;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }

        .btn:hover {
            background: #3A9DA3;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(78, 189, 196, 0.4);
        }

        .status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 2rem;
            color: #666;
            font-size: 0.85rem;
        }

        .pulse {
            width: 10px;
            height: 10px;
            background: #F39C12;
            border-radius: 50%;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        .countdown {
            font-weight: 700;
            color: #4EBDC4;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <span class="logo-icon">⛷</span>
            Skibörse Renningen
        </div>

        <div class="error-icon">⏳</div>

        <h1>Server ausgelastet</h1>

        <p>
            Momentan greifen zu viele Geräte gleichzeitig auf die Skibörse zu.
        </p>

        <div class="hint">
            <strong>Tipp:</strong> Bitte warten Sie einen Moment und versuchen Sie es dann erneut.
            Die Seite wird automatisch in <span class="countdown" id="countdown">10</span> Sekunden neu geladen.
        </div>

        <button class="btn" onclick="location.reload()">
            Jetzt erneut versuchen
        </button>

        <div class="status">
            <div class="pulse"></div>
            Server arbeitet – bitte Geduld
        </div>
    </div>

    <script>
        // Auto-reload countdown
        let seconds = 10;
        const countdownEl = document.getElementById('countdown');

        const timer = setInterval(() => {
            seconds--;
            countdownEl.textContent = seconds;

            if (seconds <= 0) {
                clearInterval(timer);
                location.reload();
            }
        }, 1000);
    </script>
</body>
</html>
